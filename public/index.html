<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <link rel="manifest" href="/manifest.json" />
    <title>아이젠하워 투두 리스트</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #1b2746 0%, #0a0f1c 45%, #070b14 100%);
        color: #eef2ff;
      }
      .app-shell { max-width: 980px; margin: 0 auto; padding-bottom: 98px; }
      header {
        position: sticky;
        top: 0;
        z-index: 30;
        backdrop-filter: blur(18px);
        background: rgba(7, 11, 20, 0.75);
        padding: calc(env(safe-area-inset-top) + 10px) 14px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      h1 { margin: 0; font-size: 1.05rem; font-weight: 700; }
      .header-meta { color: #a5b4fc; font-size: 0.75rem; margin-top: 4px; }
      .header-actions { display: flex; gap: 8px; }
      .header-circle {
        width: 40px; height: 40px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.13);
        background: rgba(255, 255, 255, 0.05); color: #e2e8f0; font-size: 1rem;
      }
      main { padding: 10px 12px 0; }
      .quick-panel {
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 10px;
        margin-bottom: 10px;
      }
      .search-input, input, textarea, select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.9);
        color: #f8fafc;
        font-size: 16px;
        padding: 11px 12px;
      }
      textarea { min-height: 88px; resize: vertical; }
      .inline { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .chips { display: flex; gap: 6px; margin-top: 8px; overflow: auto; padding-bottom: 2px; }
      .chip {
        border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.06); color: #cbd5e1;
        border-radius: 999px; padding: 7px 12px; font-size: 0.78rem; white-space: nowrap;
      }
      .chip.active { background: linear-gradient(135deg, #22d3ee, #2563eb); color: #fff; border-color: transparent; }
      #status { margin: 10px 2px; color: #94a3b8; font-size: 0.8rem; }
      .grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .quadrant { border-radius: 20px; overflow: hidden; background: rgba(15, 23, 42, 0.72); border: 1px solid rgba(255,255,255,.08); min-height: 240px; }
      .quadrant-head { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(15,23,42,.95); }
      .quadrant-title { display: flex; align-items: center; gap: 8px; }
      .quadrant-dot { width: 10px; height: 10px; border-radius: 999px; }
      .quadrant h2 { margin: 0; font-size: 0.8rem; color: #cbd5e1; }
      .icon-btn, .edit-btn { background: transparent; border: 0; color: #cbd5e1; }
      .edit-btn { white-space: nowrap; padding: 0; min-height: auto; font-size: 0.72rem; }
      .task-card { padding: 10px; border-top: 1px solid rgba(255,255,255,.08); display: grid; gap: 4px; }
      .task-head { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: start; gap: 8px; }
      .task-title {
        font-size: 0.9rem;
        font-weight: 700;
        line-height: 1.35;
        min-width: 0;
        overflow-wrap: anywhere;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .completed .task-title { text-decoration: line-through; opacity: 0.52; }
      .task-meta, .task-desc, .subtask-list { margin: 4px 0 0; font-size: 0.75rem; color: #94a3b8; }
      .task-desc {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .task-meta {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .subtask-list { padding-left: 16px; }
      .subtask-more { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
      .muted { color: #64748b; font-size: .76rem; margin: 10px; }
      dialog {
        width: min(680px, calc(100vw - 16px));
        margin-top: max(20px, env(safe-area-inset-top));
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 18px;
        background: #0b1220;
        color: #e2e8f0;
        max-height: 88dvh;
      }
      .dialog-body { padding: 14px; }
      .field { margin-bottom: 9px; }
      .field label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #cbd5e1; }
      button {
        border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 10px 12px;
        color: #f8fafc; background: #1e293b; min-height: 40px; font-weight: 600;
      }
      button.primary { background: linear-gradient(135deg, #0ea5e9, #2563eb); border: 0; }
      button.secondary { background: #0f172a; }
      button.danger { background: #7f1d1d; border-color: #991b1b; }
      .dialog-actions { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .row input[type='text'] { flex: 1; }
      #weekly-days { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
      .toast {
        position: fixed; z-index: 50; left: 50%; transform: translateX(-50%);
        bottom: calc(14px + env(safe-area-inset-bottom)); background: #0f172a;
        border: 1px solid rgba(255,255,255,.15); border-radius: 12px; padding: 10px 12px; display: none;
      }
      .fab {
        position: fixed; z-index: 40; right: 16px; bottom: calc(16px + env(safe-area-inset-bottom));
        width: 56px; height: 56px; border-radius: 999px; border: 0; font-size: 1.6rem;
        background: linear-gradient(135deg, #22d3ee, #2563eb); color: white;
        box-shadow: 0 10px 24px rgba(14,165,233,.4);
      }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
      @media (max-width: 760px) { .quadrant { min-height: 170px; } }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div class="header-top">
          <div>
            <h1 id="app-title-display">⚡ 아이젠하워 플래너</h1>
            <div class="header-meta">모바일 집중모드</div>
          </div>
          <div class="header-actions">
            <button id="btn-mode" class="header-circle" aria-label="오늘 일정만 보기">📅</button>
            <button id="btn-settings" class="header-circle" aria-label="설정">⚙️</button>
          </div>
        </div>
      </header>

      <main>
        <section class="quick-panel">
          <input id="search-input" class="search-input" placeholder="할 일 검색..." />
          <div class="chips" id="filter-chips">
            <button class="chip active" data-filter="all">전체</button>
            <button class="chip" data-filter="active">진행중</button>
            <button class="chip" data-filter="completed">완료</button>
            <button class="chip" data-filter="today">오늘</button>
          </div>
        </section>
        <div id="status" class="muted"></div>
        <section class="grid" id="quadrants"></section>
      </main>
    </div>

    <button class="fab" id="btn-add" aria-label="일정 추가">＋</button>

    <dialog id="task-dialog">
      <form class="dialog-body" id="task-form">
        <h3 id="form-title">일정 추가</h3>
        <input type="hidden" id="task-id" />
        <div class="field"><label>제목 *</label><input id="title" required /></div>
        <div class="field"><label>설명</label><textarea id="description"></textarea></div>
        <div class="field"><label>분류 *</label><select id="quadrant" required>
          <option value="Q1">Q1 중요+긴급</option><option value="Q2">Q2 중요+비긴급</option><option value="Q3">Q3 비중요+긴급</option><option value="Q4">Q4 비중요+비긴급</option>
        </select></div>
        <div class="inline">
          <div class="field"><label>날짜</label><input type="date" id="date" /></div>
          <div class="field"><label>시간</label><input type="time" id="time" /></div>
        </div>
        <div class="field"><label>반복</label><select id="repeatType"><option value="none">없음</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option></select></div>
        <div class="field" id="weekly-wrap" style="display:none"><label>요일 선택</label><div id="weekly-days"></div></div>
        <div class="field" id="monthly-wrap" style="display:none"><label>날짜 선택(1~31)</label><input id="monthly-day" type="number" min="1" max="31" /></div>
        <div class="field row"><input type="checkbox" id="notificationEnabled" /><label for="notificationEnabled">알림 사용</label></div>
        <div class="field">
          <label>세부 체크리스트</label>
          <div id="subtask-editor"></div>
          <button type="button" id="btn-add-subtask" class="secondary">+ 체크리스트 추가</button>
        </div>
        <div class="dialog-actions">
          <button type="button" id="btn-delete" class="danger" style="display:none">삭제</button>
          <div class="row">
            <button type="button" class="secondary" id="btn-cancel">취소</button>
            <button type="submit" class="primary">저장</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog id="settings-dialog">
      <div class="dialog-body">
        <h3>설정</h3>
        <div class="field"><label for="appTitleInput">보드 제목</label><input id="appTitleInput" maxlength="30" /></div>
        <div class="field">
          <label>4분면 이름 커스텀</label>
          <input id="labelQ1" placeholder="Q1 이름" maxlength="20" />
          <input id="labelQ2" placeholder="Q2 이름" maxlength="20" />
          <input id="labelQ3" placeholder="Q3 이름" maxlength="20" />
          <input id="labelQ4" placeholder="Q4 이름" maxlength="20" />
        </div>
        <div class="row"><input type="checkbox" id="hideCompletedTasks" /><label for="hideCompletedTasks">완료된 일정 숨기기</label></div>
        <p id="permission-status" class="muted"></p>
        <div class="dialog-actions"><span></span><button id="btn-close-settings" class="secondary">닫기</button></div>
      </div>
    </dialog>

    <div id="toast" class="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
