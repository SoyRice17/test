<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070c" />
    <link rel="manifest" href="/manifest.json" />
    <title>아이젠하워 투두 리스트</title>
    <style>
      :root {
        color-scheme: dark;
        font-size: 15.5px;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #000;
        color: #f3f4f6;
        line-height: 1.42;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: calc(0.8rem + env(safe-area-inset-top)) 0.6rem 0.9rem;
        display: grid;
        grid-template-columns: 52px 1fr 52px;
        align-items: center;
        gap: 0.6rem;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.97), rgba(0, 0, 0, 0.78));
      }
      h1 {
        font-size: 2rem;
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.02em;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .header-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 0.45rem;
      }
      .header-circle {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(21, 24, 31, 0.75);
        color: #e5e7eb;
        font-size: 1.7rem;
        line-height: 1;
        padding: 0;
      }
      button {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 0.55rem 0.8rem;
        cursor: pointer;
        background: #1f2937;
        color: #f9fafb;
        font-weight: 600;
        min-height: 40px;
      }
      button.primary {
        background: linear-gradient(135deg, #38bdf8, #2563eb);
        border: 0;
        white-space: nowrap;
      }
      button.secondary { background: #111827; color: #cbd5e1; }
      button.danger { background: #7f1d1d; border: 1px solid #991b1b; }
      main { padding: 0.55rem; max-width: 980px; margin: 0 auto; }
      #status {
        margin: 0.2rem 0.2rem 0.65rem;
        color: #6b7280;
        font-size: 0.75rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem;
      }
      .quadrant {
        background: #111318;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 28px;
        min-height: 38vh;
        overflow: hidden;
      }
      .quadrant-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 0.9rem 0.7rem;
        background: #0c0f15;
      }
      .quadrant-title { display: flex; align-items: center; gap: 0.55rem; }
      .quadrant-dot { width: 10px; height: 10px; border-radius: 999px; }
      .quadrant h2 { font-size: 0.78rem; margin: 0; color: #9ca3af; font-weight: 500; }
      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        padding: 0;
        background: transparent;
        border: 0;
        color: #9ca3af;
        font-size: 1.6rem;
        min-height: 0;
      }
      .task-card {
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0.95rem 0.8rem;
        background: #161920;
      }
      .task-head { display: flex; align-items: center; gap: 0.55rem; }
        width: 28px;
        height: 28px;
        border: 1px solid rgba(255,255,255,0.12);
        color: transparent;
        overflow: hidden;
      .task-state.done { background: rgba(34,197,94,0.35); border-color: rgba(34,197,94,0.35); }
      .task-title { font-weight: 700; flex: 1; font-size: 1.95rem; color: #f3f4f6; word-break: break-word; }
      .completed .task-title { text-decoration: line-through; opacity: 0.5; }
      .task-meta { font-size: 1.7rem; color: #9ca3af; margin: 0.25rem 0 0; line-height: 1.25; }
      .task-desc { font-size: 1.7rem; margin: 0.3rem 0 0; color: #cbd5e1; }
      .subtask-list { padding-left: 1rem; margin: 0.35rem 0 0; font-size: 1.45rem; color: #9ca3af; }
      .edit-btn { background: transparent; border: 0; color: #9ca3af; padding: 0; font-size: 1.45rem; }
        width: 100%; border: 1px solid #374151; border-radius: 10px; padding: 0.6rem 0.65rem;
        background: #0b1220; color: #f3f4f6; font-size: 16px;
        width: min(680px, calc(100vw - 1rem)); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
        padding: 0; background: #0b1220; color: #f3f4f6; max-height: min(90dvh, 820px); overflow: auto;
      .inline > * { flex: 1; }
      .row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.4rem; }
      .dialog-actions { display: flex; justify-content: space-between; margin-top: 0.8rem; gap: 0.5rem; flex-wrap: wrap; }
      .settings-grid { display: grid; grid-template-columns: 1fr; gap: 0.5rem; margin-bottom: 0.7rem; }
      #weekly-days { display: grid; grid-template-columns: repeat(auto-fit, minmax(62px, 1fr)); gap: 0.4rem 0.6rem; }
      .toast {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff;
        border-radius: 12px; padding: 0.6rem 0.85rem; display: none; border: 1px solid rgba(255,255,255,0.08);
      }
      .muted { color: #6b7280; font-size: 0.85rem; padding: 0.2rem 0.9rem 0.9rem; }
      @media (min-width: 700px) {
        :root { font-size: 8.6px; }
      }
      @media (max-width: 460px) {
        :root { font-size: 7.7px; }
        .grid { gap: 0.45rem; }
        .quadrant { border-radius: 24px; min-height: 34vh; }
        .header-circle { width: 46px; height: 46px; }
      }
      @media (max-width: 620px) {
        .dialog-actions > div { width: 100%; display: flex; gap: 0.4rem; }
        .dialog-actions button { flex: 1; }
      }
</style>
  </head>
  <body>
    <header>
      <button id="btn-mode" class="header-circle" aria-pressed="false" aria-label="모드 전환">‹</button>
      <h1 id="app-title-display">🤢 군생활</h1>
      <div class="header-actions">
        <button id="btn-settings" class="header-circle" aria-label="설정">⋯</button>
      </div>
    </header>

    <main>
      <div id="status" class="muted"></div>
      <section class="grid" id="quadrants"></section>
    </main>

    <dialog id="task-dialog">
      <form class="dialog-body" id="task-form">
        <h3 id="form-title">일정 추가</h3>
        <input type="hidden" id="task-id" />
        <div class="field"><label>제목 *</label><input id="title" required /></div>
        <div class="field"><label>설명</label><textarea id="description"></textarea></div>
        <div class="field">
          <label>분류 *</label>
          <select id="quadrant" required>
            <option value="Q1">Q1 중요+긴급</option>
            <option value="Q2">Q2 중요+비긴급</option>
            <option value="Q3">Q3 비중요+긴급</option>
            <option value="Q4">Q4 비중요+비긴급</option>
          </select>
        </div>
        <div class="inline">
          <div class="field"><label>날짜</label><input type="date" id="date" /></div>
          <div class="field"><label>시간</label><input type="time" id="time" /></div>
        </div>
        <div class="field"><label>반복</label>
          <select id="repeatType">
            <option value="none">없음</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option>
          </select>
        </div>
        <div class="field" id="weekly-wrap" style="display:none">
          <label>요일 선택</label>
          <div id="weekly-days" class="inline" style="flex-wrap:wrap"></div>
        </div>
        <div class="field" id="monthly-wrap" style="display:none"><label>날짜 선택(1~31)</label><input id="monthly-day" type="number" min="1" max="31" /></div>
        <div class="field row"><input type="checkbox" id="notificationEnabled" /><label for="notificationEnabled">알림 사용</label></div>

        <div class="field">
          <label>세부 체크리스트</label>
          <div id="subtask-editor"></div>
          <button type="button" id="btn-add-subtask" class="secondary">+ 체크리스트 추가</button>
        </div>

        <div class="dialog-actions">
          <div>
            <button type="button" id="btn-delete" class="danger" style="display:none">삭제</button>
          </div>
          <div>
            <button type="button" class="secondary" id="btn-cancel">취소</button>
            <button type="submit" class="primary">저장</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog id="settings-dialog">
      <div class="dialog-body">
        <h3>설정</h3>

        <div class="field">
          <label for="appTitleInput">보드 제목</label>
          <input id="appTitleInput" maxlength="30" placeholder="예: 군생활" />
        </div>
        <div class="field">
          <label>4분면 이름 커스텀</label>
          <div class="settings-grid">
            <input id="labelQ1" placeholder="Q1 이름" maxlength="20" />
            <input id="labelQ2" placeholder="Q2 이름" maxlength="20" />
            <input id="labelQ3" placeholder="Q3 이름" maxlength="20" />
            <input id="labelQ4" placeholder="Q4 이름" maxlength="20" />
          </div>
        </div>
        <div class="row"><input type="checkbox" id="hideCompletedTasks" /><label for="hideCompletedTasks">완료된 일정 숨기기</label></div>
        <p id="permission-status" class="muted"></p>
        <div class="dialog-actions">
          <span></span>
          <button id="btn-close-settings" class="secondary">닫기</button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
