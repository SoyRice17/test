<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070c" />
    <link rel="manifest" href="/manifest.json" />
    <title>아이젠하워 투두 리스트</title>
    <style>
      :root {
        color-scheme: dark;
        font-size: 15.5px;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: radial-gradient(circle at top, #0f1626 0%, #05070c 42%, #030406 100%);
        color: #f3f4f6;
        line-height: 1.45;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(16px);
        background: rgba(5, 7, 12, 0.7);
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      h1 { font-size: 1.3rem; margin: 0; font-weight: 800; letter-spacing: -0.02em; }
      .header-actions { display: flex; gap: 0.5rem; }
      button {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 0.55rem 0.8rem;
        cursor: pointer;
        background: #1f2937;
        color: #f9fafb;
        font-weight: 600;
        min-height: 40px;
      }
      button.primary {
        background: linear-gradient(135deg, #38bdf8, #2563eb);
        border: 0;
      }
      button.secondary { background: #111827; color: #cbd5e1; }
      button.danger { background: #7f1d1d; border: 1px solid #991b1b; }
      main { padding: clamp(0.75rem, 2.2vw, 1.1rem); max-width: 1100px; margin: 0 auto; }
      #status {
        margin: 0.25rem 0 1rem;
        color: #9ca3af;
        font-size: 0.84rem;
      }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 0.85rem;
      }
      .quadrant {
        background: rgba(17, 24, 39, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 24px;
        min-height: 240px;
        overflow: hidden;
      }
      .quadrant-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 0.9rem 0.7rem;
      }
      .quadrant-title { display: flex; align-items: center; gap: 0.45rem; }
      .quadrant-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
      }
      .quadrant h2 { font-size: 1.05rem; margin: 0; color: #d1d5db; font-weight: 500; }
      .icon-btn {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        padding: 0;
        background: rgba(255,255,255,0.03);
        color: #9ca3af;
        font-size: 1.25rem;
      }
      .task-card {
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0.9rem;
        background: rgba(2, 6, 23, 0.25);
      }
      .task-head { display: flex; align-items: center; gap: 0.45rem; }
      .task-title { font-weight: 650; flex: 1; font-size: 1rem; color: #f3f4f6; word-break: break-word; }
      .completed .task-title { text-decoration: line-through; opacity: 0.48; }
      .task-meta { font-size: 0.83rem; color: #9ca3af; margin: 0.4rem 0 0; line-height: 1.35; }
      .task-desc { font-size: 0.9rem; margin: 0.35rem 0 0; color: #d1d5db; }
      .subtask-list { padding-left: 1rem; margin: 0.4rem 0 0; font-size: 0.82rem; color: #cbd5e1; }
      .edit-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #9ca3af;
        padding: 0.3rem 0.5rem;
        border-radius: 8px;
        font-size: 0.72rem;
      }
      input, textarea, select {
        width: 100%;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 0.6rem 0.65rem;
        background: #0b1220;
        color: #f3f4f6;
        font-size: 16px;
      }
      textarea { min-height: 88px; resize: vertical; }
      input[type='checkbox'] { width: auto; accent-color: #38bdf8; }
      dialog {
        width: min(680px, calc(100vw - 1rem));
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 0;
        background: #0b1220;
        color: #f3f4f6;
        max-height: min(90dvh, 820px);
        overflow: auto;
      }
      .dialog-body { padding: clamp(0.85rem, 2.8vw, 1.1rem); }
      .field { margin-bottom: 0.7rem; }
      .field label { display: block; font-size: 0.82rem; margin-bottom: 0.25rem; color: #9ca3af; }
      .inline { display: flex; gap: 0.5rem; }
      .inline > * { flex: 1; }
      .row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.4rem; }
      .dialog-actions { display: flex; justify-content: space-between; margin-top: 0.8rem; gap: 0.5rem; flex-wrap: wrap; }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
        margin-bottom: 0.7rem;
      }
      #weekly-days { display: grid; grid-template-columns: repeat(auto-fit, minmax(62px, 1fr)); gap: 0.4rem 0.6rem; }
      .toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: #111827;
        color: #fff;
        border-radius: 12px;
        padding: 0.6rem 0.85rem;
        display: none;
        border: 1px solid rgba(255,255,255,0.08);
      }
      .muted { color: #6b7280; font-size: 0.85rem; padding: 0.2rem 0.9rem 0.9rem; }
      @media (min-width: 760px) {
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .quadrant { min-height: 300px; }
      }
      @media (min-width: 560px) {
        .settings-grid { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 620px) {
        h1 { font-size: 1.1rem; }
        .header-actions {
          width: 100%;
          justify-content: flex-end;
        }
        .header-actions button { font-size: 0.9rem; }
        .inline { flex-direction: column; gap: 0.2rem; }
        .dialog-actions > div { width: 100%; display: flex; gap: 0.4rem; }
        .dialog-actions button { flex: 1; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="app-title-display">🤢 군생활 플래너</h1>
      <div class="header-actions">
        <button id="btn-settings" class="secondary">설정</button>
        <button id="btn-add" class="primary">+ 일정</button>
      </div>
    </header>

    <main>
      <div id="status" class="muted"></div>
      <section class="grid" id="quadrants"></section>
    </main>

    <dialog id="task-dialog">
      <form class="dialog-body" id="task-form">
        <h3 id="form-title">일정 추가</h3>
        <input type="hidden" id="task-id" />
        <div class="field"><label>제목 *</label><input id="title" required /></div>
        <div class="field"><label>설명</label><textarea id="description"></textarea></div>
        <div class="field">
          <label>분류 *</label>
          <select id="quadrant" required>
            <option value="Q1">Q1 중요+긴급</option>
            <option value="Q2">Q2 중요+비긴급</option>
            <option value="Q3">Q3 비중요+긴급</option>
            <option value="Q4">Q4 비중요+비긴급</option>
          </select>
        </div>
        <div class="inline">
          <div class="field"><label>날짜</label><input type="date" id="date" /></div>
          <div class="field"><label>시간</label><input type="time" id="time" /></div>
        </div>
        <div class="field"><label>반복</label>
          <select id="repeatType">
            <option value="none">없음</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option>
          </select>
        </div>
        <div class="field" id="weekly-wrap" style="display:none">
          <label>요일 선택</label>
          <div id="weekly-days" class="inline" style="flex-wrap:wrap"></div>
        </div>
        <div class="field" id="monthly-wrap" style="display:none"><label>날짜 선택(1~31)</label><input id="monthly-day" type="number" min="1" max="31" /></div>
        <div class="field row"><input type="checkbox" id="notificationEnabled" /><label for="notificationEnabled">알림 사용</label></div>

        <div class="field">
          <label>세부 체크리스트</label>
          <div id="subtask-editor"></div>
          <button type="button" id="btn-add-subtask" class="secondary">+ 체크리스트 추가</button>
        </div>

        <div class="dialog-actions">
          <div>
            <button type="button" id="btn-delete" class="danger" style="display:none">삭제</button>
          </div>
          <div>
            <button type="button" class="secondary" id="btn-cancel">취소</button>
            <button type="submit" class="primary">저장</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog id="settings-dialog">
      <div class="dialog-body">
        <h3>설정</h3>

        <div class="field">
          <label for="appTitleInput">보드 제목</label>
          <input id="appTitleInput" maxlength="30" placeholder="예: 군생활" />
        </div>
        <div class="field">
          <label>4분면 이름 커스텀</label>
          <div class="settings-grid">
            <input id="labelQ1" placeholder="Q1 이름" maxlength="20" />
            <input id="labelQ2" placeholder="Q2 이름" maxlength="20" />
            <input id="labelQ3" placeholder="Q3 이름" maxlength="20" />
            <input id="labelQ4" placeholder="Q4 이름" maxlength="20" />
          </div>
        </div>
        <div class="row"><input type="checkbox" id="hideCompletedTasks" /><label for="hideCompletedTasks">완료된 일정 숨기기</label></div>
        <p id="permission-status" class="muted"></p>
        <div class="dialog-actions">
          <span></span>
          <button id="btn-close-settings" class="secondary">닫기</button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
